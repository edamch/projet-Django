<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SangConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0f12;
      --surface:   #141720;
      --surface2:  #1b1f2b;
      --border:    rgba(255,255,255,0.07);
      --red:       #e63946;
      --red-dim:   #9b1d26;
      --red-glow:  rgba(230,57,70,0.18);
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --accent:    #e63946;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .sc-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,15,18,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sc-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .sc-brand .drop {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--red);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 0 8px var(--red);
    }
    .sc-nav-actions { display: flex; align-items: center; gap: 1rem; }
    .btn-logout {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 4px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── LAYOUT ── */
    .sc-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── ALERTS ── */
    .sc-alert {
      background: var(--surface2);
      border-left: 3px solid var(--red);
      border-radius: 4px;
      padding: 12px 16px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sc-alert-close {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 0 4px;
    }
    .sc-alert-success { border-color: #2ea44f; }
    .sc-alert-warning { border-color: #d29922; }
    .sc-alert-info    { border-color: #388bfd; }

    /* ── GLOBAL UTILITY CLASSES ── */
    .sc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .sc-card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sc-card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sc-card-body { padding: 20px; }

    .btn-primary {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      background: #c9313d;
      box-shadow: 0 0 18px var(--red-glow);
      color: #fff;
    }
    .btn-ghost {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 5px;
      text-decoration: none;
      display: inline-block;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .btn-sm { padding: 5px 14px; font-size: 0.8rem; }

    .badge-red {
      background: var(--red-glow);
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 3px;
    }
    .badge-green {
      background: rgba(46,164,79,0.15);
      border: 1px solid rgba(46,164,79,0.35);
      color: #4caf50;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 3px;
    }
    .badge-yellow {
      background: rgba(210,153,34,0.15);
      border: 1px solid rgba(210,153,34,0.35);
      color: #f0c040;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 3px;
    }
    .badge-gray {
      background: rgba(107,114,128,0.15);
      border: 1px solid rgba(107,114,128,0.3);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 3px;
    }

    .text-muted { color: var(--muted) !important; }
    .text-red   { color: var(--red); }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 1.5rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 1rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 1rem; }
    .d-flex { display: flex; }
    .align-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }
    @media(max-width:768px) {
      .grid-3,.grid-4 { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media(max-width:500px) {
      .grid-3,.grid-4 { grid-template-columns: 1fr; }
    }

    /* ── TABLE ── */
    .sc-table { width: 100%; border-collapse: collapse; }
    .sc-table th {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .sc-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .sc-table tr:last-child td { border-bottom: none; }
    .sc-table tr:hover td { background: var(--surface2); }

    /* ── FORM ── */
    .sc-form-group { margin-bottom: 1.2rem; }
    .sc-label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .sc-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .sc-input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
    }
    select.sc-input { cursor: pointer; }
    .sc-input::placeholder { color: var(--muted); }

    /* ── DIVIDER ── */
    .sc-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>

  <nav class="sc-nav">
    <a class="sc-brand" href="{% url 'accueil' %}">
      <span class="drop"></span> SANGCONNECT
    </a>
    <div class="sc-nav-actions">
      {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="btn-logout">Déconnexion</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn-logout">Connexion</a>
      {% endif %}
    </div>
  </nav>

  <main class="sc-main">
    {% if messages %}
      {% for message in messages %}
        <div class="sc-alert {% if message.tags == 'success' %}sc-alert-success{% elif message.tags == 'warning' %}sc-alert-warning{% elif message.tags == 'info' %}sc-alert-info{% endif %}">
          <span>{{ message }}</span>
          <button class="sc-alert-close" onclick="this.parentElement.remove()">✕</button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

</body>
</html>
