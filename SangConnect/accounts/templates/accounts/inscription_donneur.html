{% extends 'accounts/base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow">
      <div class="card-header bg-danger text-white text-center">
        <h4 class="mb-0">Inscription Donneur</h4>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <h6 class="text-muted mb-3">Informations de connexion</h6>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Prénom</label>
              <input type="text" name="first_name" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Nom</label>
              <input type="text" name="last_name" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <hr>
          <h6 class="text-muted mb-3">Informations médicales</h6>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Groupe sanguin</label>
              <select name="groupe_sanguin" class="form-select" required>
                <option value="">-- Choisir --</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Sexe</label>
              <select name="sexe" class="form-select" required>
                <option value="">-- Choisir --</option>
                <option value="M">Masculin</option>
                <option value="F">Féminin</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Date de naissance</label>
            <input type="date" name="date_naissance" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Ville</label>
            <input type="text" name="ville" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Téléphone</label>
            <input type="text" name="telephone" class="form-control">
          </div>

          <button type="submit" class="btn btn-danger w-100">S'inscrire</button>
        </form>
      </div>
      <div class="card-footer text-center">
        Déjà inscrit ? <a href="{% url 'login' %}">Se connecter</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
