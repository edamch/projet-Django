{% extends 'accounts/base.html' %}

{% block content %}
<style>
  .reg-wrap {
    max-width: 620px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  .reg-heading {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .reg-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.8rem; }
  .section-sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.5rem 0 1.2rem;
  }
  .section-sep::before, .section-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .grid-2-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width:500px) { .grid-2-form { grid-template-columns: 1fr; } }
  .reg-footer {
    text-align: center;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .reg-footer a { color: var(--red); text-decoration: none; }
  .reg-footer a:hover { text-decoration: underline; }
</style>

<div class="reg-wrap">
  <div style="display:flex;align-items:center;gap:0.7rem;margin-bottom:1.8rem;">
    <div style="width:40px;height:40px;background:var(--red-glow);border:1px solid var(--red-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">💉</div>
    <div>
      <div class="reg-heading" style="font-size:1.5rem;">Inscription Donneur</div>
      <div class="reg-sub" style="margin-bottom:0;">Rejoignez la communauté SangConnect</div>
    </div>
  </div>

  <div class="sc-card">
    <div class="sc-card-body">
      <form method="post">
        {% csrf_token %}

        <div class="section-sep">Informations de connexion</div>

        <div class="grid-2-form">
          <div class="sc-form-group">
            <label class="sc-label">Prénom</label>
            <input type="text" name="first_name" class="sc-input" placeholder="Prénom" required>
          </div>
          <div class="sc-form-group">
            <label class="sc-label">Nom</label>
            <input type="text" name="last_name" class="sc-input" placeholder="Nom" required>
          </div>
        </div>

        <div class="sc-form-group">
          <label class="sc-label">Nom d'utilisateur</label>
          <input type="text" name="username" class="sc-input" placeholder="Identifiant unique" required>
        </div>

        <div class="sc-form-group">
          <label class="sc-label">Email</label>
          <input type="email" name="email" class="sc-input" placeholder="votre@email.com" required>
        </div>

        <div class="sc-form-group">
          <label class="sc-label">Mot de passe</label>
          <input type="password" name="password" class="sc-input" placeholder="••••••••" required>
        </div>

        <div class="section-sep">Informations médicales</div>

        <div class="grid-2-form">
          <div class="sc-form-group">
            <label class="sc-label">Groupe sanguin</label>
            <select name="groupe_sanguin" class="sc-input" required>
              <option value="">— Choisir —</option>
              <option value="A+">A+</option><option value="A-">A-</option>
              <option value="B+">B+</option><option value="B-">B-</option>
              <option value="AB+">AB+</option><option value="AB-">AB-</option>
              <option value="O+">O+</option><option value="O-">O-</option>
            </select>
          </div>
          <div class="sc-form-group">
            <label class="sc-label">Sexe</label>
            <select name="sexe" class="sc-input" required>
              <option value="">— Choisir —</option>
              <option value="M">Masculin</option>
              <option value="F">Féminin</option>
            </select>
          </div>
        </div>

        <div class="sc-form-group">
          <label class="sc-label">Date de naissance</label>
          <input type="date" name="date_naissance" class="sc-input" required>
        </div>

        <div class="grid-2-form">
          <div class="sc-form-group">
            <label class="sc-label">Ville</label>
            <input type="text" name="ville" class="sc-input" placeholder="Votre ville" required>
          </div>
          <div class="sc-form-group">
            <label class="sc-label">Téléphone</label>
            <input type="text" name="telephone" class="sc-input" placeholder="+216 XX XXX XXX">
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width:100%;text-align:center;margin-top:0.5rem;">
          Créer mon compte donneur
        </button>
      </form>

      <div class="reg-footer">
        Déjà inscrit ? <a href="{% url 'login' %}">Se connecter</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
